<div style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; color: #1f2937;">
  <div style="text-align: center; margin-bottom: 24px;">
    <h1 style="color: #4F46E5; margin: 0;">Stranger Mingle</h1>
  </div>

  <div style="background-color: #ffffff; padding: 32px; border-radius: 8px; border: 1px solid #e5e7eb;">
    <h2 style="font-size: 20px; margin-top: 0; color: #111827;">Booking Confirmed</h2>
    <p style="font-size: 16px; line-height: 24px;">Your spot is secured! Your booking for
      <strong>{{event_title}}</strong> has been successfully confirmed.
    </p>
    <p style="font-size: 14px; color: #6b7280;">Booking Reference: {{booking_ref}}</p>

    <div style="margin-top: 32px; text-align: center;">
      <a href="{{action_url}}"
        style="background-color: #4F46E5; color: #ffffff; padding: 12px 24px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 14px; display: inline-block;">
        View Ticket & Details
      </a>
    </div>
  </div>

  <div style="margin-top: 24px; text-align: center; font-size: 12px; color: #6b7280;">
    <p>&copy; {currentYear} Stranger Mingle. All rights reserved.<br>A Brand of Salty Media Production (opc) Pvt Ltd</p>
  </div>
</div>
